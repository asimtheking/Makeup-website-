<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Makeup Artist - Home</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-white text-gray-900 font-sans">
  <!-- Hero Section -->
  <section class="relative h-screen bg-cover bg-center" style="background-image: url('assets/images/hero.jpg');">
    <div class="absolute inset-0 bg-black bg-opacity-50 flex items-center justify-center">
      <div class="text-center text-white">
        <h1 class="text-5xl font-bold mb-4">Premium Makeup Artistry</h1>
        <p class="text-xl mb-6">Elegant, modern, luxurious makeup services for every occasion.</p>
        <a href="#booking" class="bg-gold-500 hover:bg-gold-600 text-white px-6 py-3 rounded-full font-semibold">Book Now</a>
      </div>
    </div>
  </section>

  <!-- Quick Links -->
  <section class="py-12 container mx-auto flex justify-around">
    <a href="#portfolio" class="text-center hover:scale-105 transition transform">
      <img src="assets/images/portfolio-thumb.jpg" class="rounded-lg shadow-lg mb-2">
      <p class="font-semibold">Portfolio</p>
    </a>
    <a href="#services" class="text-center hover:scale-105 transition transform">
      <img src="assets/images/services-thumb.jpg" class="rounded-lg shadow-lg mb-2">
      <p class="font-semibold">Services</p>
    </a>
    <a href="#booking" class="text-center hover:scale-105 transition transform">
      <img src="assets/images/booking-thumb.jpg" class="rounded-lg shadow-lg mb-2">
      <p class="font-semibold">Book Now</p>
    </a>
  </section>

  <!-- Footer -->
  <footer class="bg-gray-100 py-8 text-center">
    <p>&copy; 2026 Makeup Artist. All rights reserved.</p>
  </footer>
</body>
</html>
